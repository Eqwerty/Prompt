name: Performance Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run benchmarks
        working-directory: benchmarks/GitPrompt.Benchmarks
        run: dotnet run -c Release -- --exporters json markdown

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/GitPrompt.Benchmarks/BenchmarkDotNet.Artifacts/**
          if-no-files-found: error

