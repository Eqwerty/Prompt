name: Build

on:
  push:
    branches:
      - "master"
    paths:
      - "src/**"
      - "tests/**"
      - "GitPrompt.slnx"
      - ".github/workflows/build.yml"
      - ".github/workflows/publish.yml"
      - ".github/workflows/release.yml"
      - ".github/scripts/**"
  workflow_dispatch:

# Only one run at a time. A new push cancels any in-progress run so the
# latest commit always wins and release assets never race each other.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Restore, Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GitPrompt.slnx --nologo

      - name: Build
        run: dotnet build GitPrompt.slnx --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test GitPrompt.slnx --configuration Release --no-build --nologo

  publish:
    name: Publish Artifacts
    needs: build
    uses: ./.github/workflows/publish.yml

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gitprompt-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi
          gh release create latest \
            --title "Latest" \
            --target "${{ github.sha }}" \
            --generate-notes \
            artifacts/*