name: Build and Release

on:
  push:
    branches:
      - "master"
    paths:
      - "prompt.go"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          BIN_NAME="prompt${{ matrix.ext }}"
          DIST_DIR="dist"
          ARCHIVE_BASENAME="prompt_${{ matrix.goos }}_${{ matrix.goarch }}"

          mkdir -p "$DIST_DIR"
          go build -trimpath -ldflags="-s -w" -o "$DIST_DIR/$BIN_NAME" ./prompt.go

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            cd "$DIST_DIR"
            zip "${ARCHIVE_BASENAME}.zip" "$BIN_NAME"
          else
            tar -C "$DIST_DIR" -czf "$DIST_DIR/${ARCHIVE_BASENAME}.tar.gz" "$BIN_NAME"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: prompt-*
          merge-multiple: true

      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: artifacts/*
          generate_release_notes: true