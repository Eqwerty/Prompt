name: Build and Release

on:
  push:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run test suite
        run: dotnet test Prompt.slnx --configuration Release --nologo

  build:
    name: Build ${{ matrix.target_os }}-${{ matrix.target_architecture }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_architecture: amd64
            runtime_identifier: linux-x64
            extension: ""
            runner: ubuntu-latest
          - target_os: darwin
            target_architecture: amd64
            runtime_identifier: osx-x64
            extension: ""
            runner: macos-latest
          - target_os: windows
            target_architecture: amd64
            runtime_identifier: win-x64
            extension: ".exe"
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish binary
        shell: bash
        run: |
          set -euo pipefail
          DIST_DIR="dist"
          PUBLISH_DIR="$DIST_DIR/publish"
          BIN_NAME="prompt${{ matrix.extension }}"
          ARCHIVE_BASENAME="prompt_${{ matrix.target_os }}_${{ matrix.target_architecture }}"

          rm -rf "$DIST_DIR"
          mkdir -p "$DIST_DIR"

          dotnet publish src/Prompt/Prompt.csproj \
            -c Release \
            -r "${{ matrix.runtime_identifier }}" \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "$PUBLISH_DIR"

          cp "$PUBLISH_DIR/Prompt${{ matrix.extension }}" "$DIST_DIR/$BIN_NAME"

          if [[ "${{ matrix.target_os }}" == "windows" ]]; then
            (
              cd "$DIST_DIR"
              7z a "${ARCHIVE_BASENAME}.zip" "$BIN_NAME" > /dev/null
            )
          else
            tar -C "$DIST_DIR" -czf "$DIST_DIR/${ARCHIVE_BASENAME}.tar.gz" "$BIN_NAME"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prompt-${{ matrix.target_os }}-${{ matrix.target_architecture }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: prompt-*
          merge-multiple: true

      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: artifacts/*
          generate_release_notes: true